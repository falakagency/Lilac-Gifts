kind = "web"
previewPath = "/"
title = "Lilac Gifts"
version = "1.0.0"
id = "artifacts/lilac-gifts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20024

[services.development]
run = "pnpm --filter @workspace/lilac-gifts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lilac-gifts", "run", "build" ]
publicDir = "artifacts/lilac-gifts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20024"
BASE_PATH = "/"
